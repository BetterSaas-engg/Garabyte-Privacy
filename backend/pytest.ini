[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Quieter output by default; use -v for verbose
addopts = -ra --strict-markers --tb=short

# Suppress the cosmetic deprecation warnings that come from upstream
# packages we don't control. Anything from app/ still surfaces.
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*
    ignore::DeprecationWarning:passlib.*
    # datetime.utcnow() is deprecated in 3.14 but used heavily across the
    # codebase; migrate to timezone-aware utc in a separate pass.
    ignore:datetime.datetime.utcnow.*:DeprecationWarning
