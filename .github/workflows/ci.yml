name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Alembic migrations apply to a fresh DB
        env:
          DATABASE_URL: sqlite:///./ci_alembic.db
        run: |
          alembic upgrade head
          alembic check  # fails if model metadata diverges from migrations

      # The smoke tests are bare scripts (not pytest); some print [FAIL]
      # but exit 0. The grep guard catches that until they are converted
      # to proper pytest tests (M12 in the audit). GitHub Actions' default
      # shell is `bash -eo pipefail`, so the pipe preserves python's exit
      # code and any non-zero stops the step.
      - name: Smoke tests — rules loader
        run: |
          python test_rules_loader.py 2>&1 | tee out.log
          ! grep -q '\[FAIL\]' out.log

      - name: Smoke tests — scoring engine
        run: |
          python test_scoring.py 2>&1 | tee out.log
          ! grep -q '\[FAIL\]' out.log

      - name: Smoke tests — database
        run: |
          python test_database.py 2>&1 | tee out.log
          ! grep -q '\[FAIL\]' out.log

      - name: Smoke tests — end-to-end
        run: python test_end_to_end.py

  frontend:
    name: Frontend lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Build needs SOMETHING for the API URL; the value is irrelevant
          # in CI since we don't make network calls during build.
          NEXT_PUBLIC_API_URL: http://localhost:8001
