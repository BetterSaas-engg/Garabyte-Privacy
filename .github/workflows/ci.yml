name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Alembic migrations apply to a fresh DB
        env:
          DATABASE_URL: sqlite:///./ci_alembic.db
        run: |
          alembic upgrade head
          alembic check  # fails if model metadata diverges from migrations

      - name: Pytest suite
        run: pytest -ra

      # Legacy script-style smoke tests. Kept around because they exercise
      # full flows in a different shape than the pytest suite (and the
      # scoring-profile baselines are useful as a sanity check). The grep
      # guard catches the [FAIL] lines they emit in print form.
      - name: Legacy smoke — end-to-end
        run: |
          python test_end_to_end.py 2>&1 | tee out.log
          ! grep -q '\[FAIL\]' out.log

  frontend:
    name: Frontend lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Build needs SOMETHING for the API URL; the value is irrelevant
          # in CI since we don't make network calls during build.
          NEXT_PUBLIC_API_URL: http://localhost:8001
