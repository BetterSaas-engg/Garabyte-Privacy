version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      backend-minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major bumps tend to break the migration check + test suite. Bump
      # these manually after reading release notes.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      frontend-minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major bumps (next 14->16, react 18->19, typescript 5->6) need
      # coordinated peer-package updates -- handle manually.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
